databaseChangeLog:
  - changeSet:
      id: create-completed-jobs-table
      author: Junie
      changes:
        - createTable:
            tableName: CompletedJobs
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: job_id
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: file_path
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: file_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: started_at
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: duration_ms
                  type: bigint
                  constraints:
                    nullable: false
